apiVersion: v1
kind: ServiceAccount
metadata:
  name: records-api
  namespace: nagp-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: records-api-ops
  namespace: nagp-app
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: records-api-ops
  namespace: nagp-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: records-api-ops
subjects:
  - kind: ServiceAccount
    name: records-api
    namespace: nagp-app
---
# Cluster-scoped reads: nodes (for the node panel) and pod metrics (metrics-server).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: records-api-cluster-read
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: records-api-cluster-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: records-api-cluster-read
subjects:
  - kind: ServiceAccount
    name: records-api
    namespace: nagp-app
